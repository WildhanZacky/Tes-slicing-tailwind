<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @font-face {
            font-family: 'CircularStd-Book';
            src: url(CircularStd-Book.woff) format(woff);
        }

        body {
            font-family: 'CircularStd-Book', sans-serif;
        }
    </style>
</head>
<body class="bg-white">

    <img src="Ellipse 23.png" alt="" class="absolute top-0 left-0 -z-20 w-1/2 md:w-1/3">

    <!--mainContainer-->
    <div class="max-w-7xl mx-auto px-3 py-8">
        <!--navigationBar-->
        <nav class="flex justify-between items-center mb-20 pb-10">
            <div class="flex items-center gap-2">
                <img src="logo/logoWeb.png" alt="" class="w-10">
                <span class="text-2xl font-bold">Travlog</span>
            </div>

            <div class="hidden md:flex gap-10 text-gray-500 font-medium">
                <a href="#" class="hover:text-black">Home</a>
                <a href="#" class="hover:text-black">Discover</a>
                <a href="#" class="hover:text-black">Special Deals</a>
                <a href="#" class="hover:text-black">Contact</a>
            </div>

            <div class="flex gap-4 items-center">
                <a href="" class="font-bold text-sm">Log In</a>
                <a href="" class="bg-[#5D50C6] text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg shadow-indigo-200 hover:opacity-90 transition-all">Sign Up</a>
            </div>
        </nav>


        <div class="grid lg:grid-cols-2 gap-12 items-center">
            <div>
                <div class="flex items-center gap-3 bg-white w-max px-4 py-3 rounded-full shadow-sm mb-8">
                    <span class="text-[#F85E9F] font-bold text-sm">Explore the world!</span>
                    <img src="logo/logoTas.png" alt="" class="w-5">
                </div>

                <h1 class="text-5xl lg:text-7xl font-bold leading-tight mb-8">
                    Travel <span class="text-[#F85E9F]">Top destination</span> of the world
                </h1>
                
                <p class="text-gray-500 text-lg mb-10 max-w-md">
                    We always make our customer happy by providing as many choices as possible.
                </p>

                <div class="flex gap-4">
                    <a href="" class="bg-[#5D50C6] text-white px-8 py-4 rounded-full font-bold shadow-xl hover:opacity-90 transition-all">Get Started</a>
                    <a href="" class="flex items-center gap-2 bg-white border-1 border-gray-200 px-8 py-4 rounded-full font-bold hover:opacity-70 transition-all">
                        <span class="p-1"><img src="logo/logoPlay.png" alt=""></span> Watch Demo
                    </a>
                </div>
            </div>

            <div class="relative flex gap-8">
                <div class="absolute top-0 left-0 w-full h-full -z-10 flex justify-center items-center">
                    <img src="fotoLandingPage/layerPesawat.png" class="min-w-[140%] max-w-none transform -translate-x-5 -translate-y-55" alt="">
                </div>

                <div class="flex flex-col gap-8">
                    <img src="fotoLandingPage/kiriAtas.jpg" alt="" class="rounded-3xl w-60 h-80 object-cover">
                    <img src="fotoLandingPage/kiriBawah.jpg" alt="" class="rounded-3xl w-60 h-80 object-cover">
                </div>

                <div class="mt-40 relative">
                    <img src="fotoLandingPage/Kanan.jpg" alt="" class="rounded-3xl w-60 h-90 object-cover">

                    <div class="absolute -right-10 bottom-45 bg-white px-4 py-3 rounded-full shadow-xl flex items-center gap-2 whitespace-nowrap">
                        <img src="logo/Sharelock-takparani.png" alt="">
                        <span class="text-sm font-bold">Top Places</span>
                    </div>
                </div>

                <div class="absolute -translate-x-5 translate-y-5 left-[-30] top-[40%] bg-[#F85E9F] p-4 rounded-full shadow-lg shadow-pink-200">
                    <img src="logo/pesawatTwitter.png" alt="">
                </div>

                <div class="absolute right-50 -bottom-1 bg-[#FF5722] p-5 rounded-full shadow-xl shadow-orange-200">
                    <img src="logo/orangPlus.png" alt="">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
